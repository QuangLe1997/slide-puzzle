<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{ --bg:#070710; --ink:#eef1ff; --mut:#9aa0c4; --line:rgba(255,255,255,.10);
    --panel:rgba(20,22,40,.60); --acc:#56d4ff;
    --disp:'Orbitron',system-ui,sans-serif; --body:'Space Grotesk',system-ui,-apple-system,sans-serif; }
  html,body{height:100%;}
  body{ background:var(--bg); color:var(--ink); font-family:var(--body); line-height:1.4;
    min-height:100dvh; overflow-x:hidden; -webkit-font-smoothing:antialiased;
    touch-action:manipulation; display:flex; flex-direction:column; }
  body::before{ content:""; position:fixed; inset:-25%; z-index:-2; pointer-events:none;
    background:
      radial-gradient(38% 38% at 18% 16%, color-mix(in srgb,var(--acc) 26%,transparent), transparent 60%),
      radial-gradient(40% 40% at 84% 20%, rgba(167,139,250,.16), transparent 60%),
      radial-gradient(46% 46% at 50% 94%, rgba(255,90,170,.13), transparent 60%);
    filter:blur(14px); animation:mesh 24s ease-in-out infinite alternate; transition:background .6s; }
  body::after{ content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:radial-gradient(120% 95% at 50% -10%, transparent 52%, rgba(0,0,0,.55)); }
  @keyframes mesh{ from{transform:translate(-2%,-1%) scale(1)} to{transform:translate(2%,3%) scale(1.06)} }

  .app{ width:100%; max-width:1000px; margin:0 auto; flex:1;
    padding:clamp(16px,3vw,30px) clamp(14px,3vw,26px) 6px; display:flex; flex-direction:column; }

  .top{ text-align:center; margin-bottom:clamp(14px,3vw,26px); }
  .brand{ font-family:var(--disp); font-weight:900; letter-spacing:.06em; text-transform:uppercase;
    font-size:clamp(26px,6vw,50px); line-height:1; overflow-wrap:break-word;
    background:linear-gradient(95deg,#56d4ff,#a78bfa 55%,#ff5aaa);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 4px 30px color-mix(in srgb,var(--acc) 28%,transparent)); transition:filter .5s; }
  .tag{ margin-top:7px; color:var(--mut); font-family:var(--disp); font-weight:600;
    font-size:11px; letter-spacing:.34em; text-transform:uppercase; }

  .play{ display:grid; grid-template-columns:minmax(0,1fr) 312px; gap:clamp(16px,2.4vw,26px); align-items:start; }
  .board-col{ display:flex; flex-direction:column; gap:14px; min-width:0; }

  .statbar{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .stat{ text-align:center; padding:10px 6px; border-radius:14px; border:1px solid var(--line);
    background:var(--panel); backdrop-filter:blur(10px); }
  .stat .l{ display:block; font-family:var(--disp); font-weight:600; font-size:9.5px; letter-spacing:.18em;
    text-transform:uppercase; color:var(--mut); }
  .stat .v{ display:block; font-family:var(--disp); font-weight:800; font-size:clamp(20px,4.4vw,26px); margin-top:3px;
    font-variant-numeric:tabular-nums; }
  .stat.best .v{ color:#ffd24a; }

  #board{ position:relative; width:100%; max-width:min(100%, 70vh); aspect-ratio:1; margin-inline:auto;
    border-radius:18px; overflow:hidden; background:#0b0d18;
    border:1px solid color-mix(in srgb,var(--acc) 30%,var(--line));
    box-shadow:0 30px 80px -34px color-mix(in srgb,var(--acc) 60%,#000),
      0 0 0 1px rgba(255,255,255,.04) inset, 0 0 60px -34px color-mix(in srgb,var(--acc) 80%,transparent) inset;
    transition:box-shadow .5s, border-color .5s; touch-action:none; }
  .tile{ position:absolute; background-repeat:no-repeat; cursor:pointer;
    transition:left .14s cubic-bezier(.3,.85,.3,1), top .14s cubic-bezier(.3,.85,.3,1);
    border-radius:8px; overflow:hidden; box-shadow:0 2px 7px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.07) inset; }
  .tile .num{ position:absolute; left:6px; top:4px; font-family:var(--disp); font-weight:800; font-size:13px;
    color:#fff; text-shadow:0 1px 4px #000,0 0 9px rgba(0,0,0,.85); opacity:0; transition:opacity .15s; }
  body.shownum .tile .num{ opacity:.95; }
  .tile.blank{ background:transparent!important; box-shadow:none; cursor:default; pointer-events:none; }
  body.solved .tile{ border-radius:0; box-shadow:none; }
  body.solved .tile .num{ opacity:0!important; }
  body.solved #board{ box-shadow:0 30px 90px -30px color-mix(in srgb,var(--acc) 90%,#000), 0 0 0 2px var(--acc) inset; }
  #preview{ position:absolute; inset:0; background-size:cover; background-position:center; opacity:0;
    pointer-events:none; transition:opacity .18s; z-index:5; box-shadow:0 0 0 2px var(--acc) inset; }
  #preview.show{ opacity:1; }

  .panel{ display:flex; flex-direction:column; gap:16px; padding:18px; border-radius:18px;
    border:1px solid var(--line); background:var(--panel); backdrop-filter:blur(14px); box-shadow:0 24px 60px -34px #000; }
  .block{ display:flex; flex-direction:column; gap:10px; }
  .block-h{ font-family:var(--disp); font-weight:600; font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--mut); }

  .seg{ display:grid; grid-template-columns:repeat(3,1fr); gap:6px; padding:5px; border-radius:13px;
    background:rgba(255,255,255,.04); border:1px solid var(--line); }
  .seg button{ font-family:var(--disp); font-weight:700; font-size:12.5px; letter-spacing:.03em; color:#cfd4f4;
    background:transparent; border:0; border-radius:9px; padding:9px 4px; cursor:pointer; transition:.15s; }
  .seg button:hover{ background:rgba(255,255,255,.06); }
  .seg button.on{ background:linear-gradient(180deg,color-mix(in srgb,var(--acc) 92%,#fff),var(--acc)); color:#05060c;
    box-shadow:0 4px 14px -6px var(--acc); }

  .goalrow{ display:flex; gap:12px; align-items:stretch; }
  .target{ width:74px; aspect-ratio:1; flex:none; border-radius:12px; background-size:cover; background-position:center;
    border:1px solid var(--line); box-shadow:0 8px 18px -10px #000, 0 0 0 1px rgba(255,255,255,.05) inset; }
  .picks{ display:flex; gap:8px; flex-wrap:wrap; }
  .pick{ width:42px; height:42px; border-radius:10px; background-size:cover; background-position:center; cursor:pointer;
    border:2px solid transparent; opacity:.72; transition:.15s; }
  .pick:hover{ opacity:1; transform:translateY(-2px); }
  .pick.on{ opacity:1; border-color:var(--acc); box-shadow:0 0 0 3px color-mix(in srgb,var(--acc) 24%,transparent); }
  .pick.add{ display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:800; opacity:.9;
    color:var(--acc); background:rgba(255,255,255,.05); border:2px dashed color-mix(in srgb,var(--acc) 55%,var(--line)); }
  .pick.add:hover{ opacity:1; }

  .btn{ font-family:var(--disp); font-weight:700; font-size:12px; letter-spacing:.04em; color:#eaf0ff; cursor:pointer;
    border:1px solid var(--line); border-radius:12px; padding:11px 12px; background:rgba(255,255,255,.05);
    display:inline-flex; align-items:center; justify-content:center; gap:7px; user-select:none; transition:.13s; white-space:nowrap; }
  .btn:hover{ border-color:color-mix(in srgb,var(--acc) 50%,transparent); background:rgba(255,255,255,.09); }
  .btn:active{ transform:translateY(1px); }
  .btn.primary{ color:#05060c; border:0; background:linear-gradient(95deg,var(--acc),color-mix(in srgb,var(--acc) 45%,#fff));
    box-shadow:0 10px 26px -10px var(--acc); }
  .btn.big{ padding:14px; font-size:13.5px; }
  .btn.on{ color:#05060c; border:0; background:linear-gradient(95deg,#ffd24a,#ff9a3a); }
  .btn.ghost{ background:transparent; flex:1; }
  .btn.icon{ flex:none; width:46px; padding:11px 0; }
  .actions{ gap:10px; }
  .actrow{ display:flex; gap:8px; }
  .actrow > .btn{ flex:1; }

  footer{ margin-top:auto; padding:20px 8px 26px; text-align:center; color:var(--mut); font-size:13px; }
  footer a{ color:#cfd4f4; text-decoration:none; border-bottom:1px solid var(--line); }
  footer a:hover{ color:#fff; }

  #win{ position:fixed; inset:0; z-index:30; display:none; align-items:center; justify-content:center;
    background:rgba(5,6,14,.74); backdrop-filter:blur(7px); padding:18px; }
  #win.show{ display:flex; animation:fade .25s ease; }
  @keyframes fade{ from{opacity:0; transform:scale(.985)} }
  .wincard{ width:min(94vw,400px); text-align:center; padding:30px 26px; border-radius:22px;
    border:1px solid var(--line); background:linear-gradient(180deg,rgba(24,26,44,.97),rgba(11,12,22,.99));
    box-shadow:0 40px 90px -24px color-mix(in srgb,var(--acc) 55%,#000); }
  .winttl{ font-family:var(--disp); font-weight:900; font-size:clamp(26px,7vw,34px); letter-spacing:.04em;
    background:linear-gradient(95deg,var(--acc),#ffd24a); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .winsub{ color:var(--mut); margin:6px 0 16px; letter-spacing:.12em; text-transform:uppercase; font-size:12px; font-family:var(--disp); font-weight:600; }
  .pr{ color:#ffd24a; font-family:var(--disp); font-weight:700; font-size:12px; letter-spacing:.1em; margin-bottom:14px; min-height:15px; }
  .winrow{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
  .winbtns{ display:flex; gap:10px; }
  .winbtns .btn{ flex:1; padding:14px; }

  @media (max-width:860px){
    .play{ grid-template-columns:1fr; gap:16px; }
    .panel{ padding:15px; }
    #board{ max-width:min(100%, 62vh); }
    .picks{ flex-wrap:nowrap; overflow-x:auto; padding-bottom:4px; -webkit-overflow-scrolling:touch; }
    .pick,.pick.add{ flex:none; }
  }
  @media (max-width:420px){ .stat .v{ font-size:21px; } .goalrow{ gap:10px; } .target{ width:64px; } }
  @media (prefers-reduced-motion:reduce){ *{animation:none!important; transition:none!important;} }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">SLIDE QUEST</div>
    <div class="tag">Sliding Picture Puzzle</div>
  </header>

  <main class="play">
    <section class="board-col">
      <div class="statbar">
        <div class="stat"><span class="l">Moves</span><span class="v" id="uiMoves">0</span></div>
        <div class="stat"><span class="l">Time</span><span class="v" id="uiTime">0:00</span></div>
        <div class="stat best"><span class="l">Best</span><span class="v" id="uiBest">&mdash;</span></div>
      </div>
      <div id="board"><div id="preview"></div></div>
    </section>

    <aside class="panel">
      <div class="block">
        <div class="block-h">Board size</div>
        <div class="seg" id="sizeSeg">
          <button data-n="3">3&times;3</button>
          <button data-n="4" class="on">4&times;4</button>
          <button data-n="5">5&times;5</button>
        </div>
      </div>

      <div class="block">
        <div class="block-h">Picture</div>
        <div class="goalrow">
          <div class="target" id="target" title="Goal image"></div>
          <button class="btn ghost" id="previewBtn">&#128065;&nbsp;Hold to peek</button>
        </div>
        <div class="picks" id="picks"></div>
      </div>

      <div class="block actions">
        <button class="btn primary big" id="shuffleBtn">&#10227;&nbsp;Shuffle</button>
        <div class="actrow">
          <button class="btn" id="uploadBtn">&#128247;&nbsp;Photo</button>
          <button class="btn" id="numBtn">#&nbsp;Numbers</button>
          <button class="btn icon" id="soundBtn">&#128266;</button>
        </div>
      </div>
    </aside>
  </main>

  <footer>
    Built by <a href="https://github.com/QuangLe1997" target="_blank" rel="noopener">QuangLe1997</a> &middot;
    <a href="https://quangle1997.github.io/arcade/" target="_blank" rel="noopener">more games &#8599;</a>
  </footer>
</div>

<div id="win"><div class="wincard">
  <div class="winttl">SOLVED!</div>
  <div class="winsub" id="winSub">4&times;4 &middot; Cosmos</div>
  <div class="pr" id="winPr"></div>
  <div class="winrow">
    <div class="stat"><span class="l">Moves</span><span class="v" id="winMoves">0</span></div>
    <div class="stat"><span class="l">Time</span><span class="v" id="winTime">0:00</span></div>
  </div>
  <div class="winbtns">
    <button class="btn primary" id="winAgain">&#10227;&nbsp;Play Again</button>
    <button class="btn" id="winNext">&#128444;&nbsp;Next Picture</button>
  </div>
</div></div>

<script>
let IMAGES = [
  { id:'cosmos', name:'Cosmos', accent:'#56d4ff', url:'assets/cosmos.jpg' },
  { id:'safari', name:'Safari', accent:'#7ee787', url:'assets/safari.jpg' },
  { id:'city',   name:'Neon City', accent:'#ff5aaa', url:'assets/city.jpg' },
];
const boardEl = document.getElementById('preview').parentElement;
const previewEl = document.getElementById('preview');
const $ = id => document.getElementById(id);

let N = 4, imgIdx = 0;
let board = [];            // board[position] = tileId; blank tile id = N*N-1
let tiles = [];            // DOM nodes indexed by tileId
let moves = 0, started = false, t0 = 0, timer = null, solvedFlag = false;
let sound = true;

const imgUrl = i => IMAGES[i].url;
const BLANK = () => N*N-1;
const bestKey = () => `slidequest.best.${N}`;

/* ---------- audio (tiny WebAudio synth) ---------- */
let actx;
function beep(freq, dur=0.06, type='triangle', vol=0.12){
  if(!sound) return;
  try{ actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type; o.frequency.value=freq; o.connect(g); g.connect(actx.destination);
    g.gain.setValueAtTime(vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
    o.start(); o.stop(actx.currentTime+dur);
  }catch(e){}
}
function winChord(){ if(!sound) return; [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.22,'triangle',0.12), i*90)); }

/* ---------- build & render ---------- */
function buildTiles(){
  [...boardEl.querySelectorAll('.tile')].forEach(t=>t.remove());
  tiles = [];
  const sizePct = 100/N;
  for(let id=0; id<N*N; id++){
    const t = document.createElement('div');
    t.className = 'tile' + (id===N*N-1 ? ' blank' : '');
    t.style.width = sizePct+'%'; t.style.height = sizePct+'%';
    if(id!==N*N-1){
      const hr = Math.floor(id/N), hc = id%N;
      t.style.backgroundImage = `url(${imgUrl(imgIdx)})`;
      t.style.backgroundSize = (N*100)+'%';
      t.style.backgroundPosition = (N>1 ? `${hc*100/(N-1)}% ${hr*100/(N-1)}%` : '0 0');
      const num = document.createElement('span');
      num.className='num'; num.textContent = id+1; t.appendChild(num);
    }
    t.addEventListener('click', ()=>tap(id));
    boardEl.appendChild(t);
    tiles.push(t);
  }
}
function render(){
  const sizePct = 100/N;
  for(let pos=0; pos<board.length; pos++){
    const id = board[pos], t = tiles[id];
    t.style.left = (pos%N)*sizePct + '%';
    t.style.top  = Math.floor(pos/N)*sizePct + '%';
  }
}
function adj(a,b){ const ra=Math.floor(a/N),ca=a%N,rb=Math.floor(b/N),cb=b%N; return Math.abs(ra-rb)+Math.abs(ca-cb)===1; }

function tap(id){
  if(solvedFlag) return;
  const pos = board.indexOf(id), bpos = board.indexOf(BLANK());
  if(!adj(pos,bpos)) return;
  board[pos]=BLANK(); board[bpos]=id;
  if(!started){ started=true; t0=Date.now(); timer=setInterval(updTime,250); }
  moves++; $('uiMoves').textContent = moves;
  beep(420+Math.random()*80, 0.05, 'square', 0.08);
  render();
  if(isSolved()) win();
}
function slideDir(dr,dc){          // keyboard: move tile into the blank from direction (dr,dc)
  if(solvedFlag) return;
  const bpos=board.indexOf(BLANK()), r=Math.floor(bpos/N)+dr, c=bpos%N+dc;
  if(r<0||r>=N||c<0||c>=N) return;
  tap(board[r*N+c]);
}
function isSolved(){ return board.every((t,i)=>t===i); }

/* ---------- shuffle (always solvable) ---------- */
function shuffle(){
  board = Array.from({length:N*N},(_,i)=>i);
  let bpos = N*N-1, last = -1;
  const K = N*N*40 + 60;
  for(let k=0;k<K;k++){
    const r=Math.floor(bpos/N), c=bpos%N, opts=[];
    if(r>0) opts.push(bpos-N); if(r<N-1) opts.push(bpos+N);
    if(c>0) opts.push(bpos-1); if(c<N-1) opts.push(bpos+1);
    const choice = opts.filter(o=>o!==last);
    const pick = (choice.length?choice:opts)[Math.floor(Math.random()*(choice.length?choice.length:opts.length))];
    board[bpos]=board[pick]; board[pick]=BLANK(); last=bpos; bpos=pick;
  }
  if(isSolved()){ [board[0],board[1]]=[board[1],board[0]]; }   // guarantee not pre-solved
}

/* ---------- game flow ---------- */
function newGame(keepImg){
  if(timer){ clearInterval(timer); timer=null; }
  solvedFlag=false; document.body.classList.remove('solved');
  started=false; moves=0; $('uiMoves').textContent='0'; $('uiTime').textContent='0:00';
  document.documentElement.style.setProperty('--acc', IMAGES[imgIdx].accent);
  buildTiles(); shuffle(); render(); showBest();
  previewEl.style.backgroundImage = `url(${imgUrl(imgIdx)})`;
  $('target').style.backgroundImage = `url(${imgUrl(imgIdx)})`;
  $('win').classList.remove('show');
}
function updTime(){ $('uiTime').textContent = fmt(Date.now()-t0); }
function fmt(ms){ const s=Math.floor(ms/1000); return Math.floor(s/60)+':' + String(s%60).padStart(2,'0'); }

function win(){
  solvedFlag=true; if(timer){ clearInterval(timer); timer=null; }
  document.body.classList.add('solved'); render();
  const ms = started ? Date.now()-t0 : 0;
  winChord();
  // best record
  let best=null; try{ best = JSON.parse(localStorage.getItem(bestKey())||'null'); }catch(e){}
  let rec='';
  if(!best || moves<best.moves || (moves===best.moves && ms<best.ms)){
    best = { moves, ms }; try{ localStorage.setItem(bestKey(), JSON.stringify(best)); }catch(e){}
    rec='★ NEW BEST! ★';
  }
  $('winMoves').textContent = moves;
  $('winTime').textContent = fmt(ms);
  $('winSub').textContent = `${N}×${N} · ${IMAGES[imgIdx].name}`;
  $('winPr').textContent = rec;
  showBest();
  setTimeout(()=>$('win').classList.add('show'), 520);
}
function showBest(){
  let best=null; try{ best=JSON.parse(localStorage.getItem(bestKey())||'null'); }catch(e){}
  $('uiBest').textContent = best ? `${best.moves}` : '—';
}

/* ---------- pickers / controls ---------- */
function buildPicks(){
  const wrap=$('picks'); [...wrap.children].forEach(c=>c.remove());
  IMAGES.forEach((im,i)=>{
    const b=document.createElement('div');
    b.className='pick'+(i===imgIdx?' on':''); b.title=im.name;
    b.style.backgroundImage=`url(${imgUrl(i)})`;
    b.addEventListener('click', ()=>{ imgIdx=i; buildPicks(); newGame(); });
    wrap.appendChild(b);
  });
  const up=document.createElement('div');               // upload-your-own tile
  up.className='pick add'; up.title='Upload your own photo'; up.textContent='＋';
  up.addEventListener('click', ()=>fileInput.click());
  wrap.appendChild(up);
}

/* ---------- upload your own photo (100% client-side — never leaves your device) ---------- */
const fileInput = document.createElement('input');
fileInput.type='file'; fileInput.accept='image/*'; fileInput.style.display='none';
fileInput.addEventListener('change', e=>{ loadFile(e.target.files && e.target.files[0]); e.target.value=''; });
document.body.appendChild(fileInput);
function loadFile(file){
  if(!file || !/^image\//.test(file.type)) return;
  const fr=new FileReader();
  fr.onload = ev => { const img=new Image(); img.onload=()=>setCustom(img); img.src=ev.target.result; };
  fr.readAsDataURL(file);
}
function setCustom(img){                                 // center-crop to a square, downscale, use as the puzzle picture
  const s=Math.min(img.naturalWidth,img.naturalHeight)||1, S=Math.min(900,s);
  const cv=document.createElement('canvas'); cv.width=cv.height=S;
  cv.getContext('2d').drawImage(img, (img.naturalWidth-s)/2, (img.naturalHeight-s)/2, s, s, 0,0, S,S);
  const url=cv.toDataURL('image/jpeg',0.9);
  let i=IMAGES.findIndex(g=>g.id==='custom');
  if(i<0){ IMAGES.push({id:'custom', name:'Your Photo', accent:'#ffd24a', url}); i=IMAGES.length-1; }
  else IMAGES[i].url=url;
  try{ localStorage.setItem('slidequest.custom', url); }catch(e){}
  imgIdx=i; buildPicks(); newGame();
}
try{ const c=localStorage.getItem('slidequest.custom'); if(c) IMAGES.push({id:'custom', name:'Your Photo', accent:'#ffd24a', url:c}); }catch(e){}
$('sizeSeg').addEventListener('click', e=>{ const b=e.target.closest('button'); if(!b) return;
  N=+b.dataset.n; [...$('sizeSeg').children].forEach(x=>x.classList.toggle('on',x===b)); newGame(); });
$('shuffleBtn').addEventListener('click', ()=>{ beep(300,0.08,'sawtooth',0.08); newGame(); });
$('numBtn').addEventListener('click', ()=>{ document.body.classList.toggle('shownum'); $('numBtn').classList.toggle('on'); });
$('soundBtn').addEventListener('click', ()=>{ sound=!sound; $('soundBtn').textContent = sound?'🔊':'🔇'; });
$('uploadBtn').addEventListener('click', ()=>fileInput.click());
const peek = on => previewEl.classList.toggle('show', on);
const pv = $('previewBtn');
['mousedown','touchstart'].forEach(ev=>pv.addEventListener(ev, e=>{ e.preventDefault(); peek(true); }, {passive:false}));
['mouseup','mouseleave','touchend','touchcancel'].forEach(ev=>pv.addEventListener(ev, ()=>peek(false)));
$('winAgain').addEventListener('click', ()=>newGame());
$('winNext').addEventListener('click', ()=>{ imgIdx=(imgIdx+1)%IMAGES.length;
  [...$('picks').children].forEach((c,j)=>c.classList.toggle('on',j===imgIdx)); newGame(); });
addEventListener('keydown', e=>{
  const k=e.key;
  if(k==='ArrowUp'||k==='w'){ slideDir(1,0); e.preventDefault(); }
  else if(k==='ArrowDown'||k==='s'){ slideDir(-1,0); e.preventDefault(); }
  else if(k==='ArrowLeft'||k==='a'){ slideDir(0,1); e.preventDefault(); }
  else if(k==='ArrowRight'||k==='d'){ slideDir(0,-1); e.preventDefault(); }
  else if(k===' '||k==='r'||k==='R'){ newGame(); e.preventDefault(); }
});

buildPicks();
newGame();
</script>
